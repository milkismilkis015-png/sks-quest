<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKS Quest — Воронёнок</title>
    <!-- ИКОНКА САЙТА (ОТНОСИТЕЛЬНЫЙ ПУТЬ) -->
    <link rel="shortcut icon" href="img/7Y457RFt6SxkWasi4TfwLKpdbcHS7tkXp3oJC_Eagk6XOuefbgbDSy3ZvMd-Gy4usZn_yRl9UnS7C02er1EsXuNi.jpg" type="image/x-icon">
    <!-- Подключаем CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Шапка -->
        <header>
            <div class="user-info">
                <span>👤 Алексей</span>
                <div class="bonus-balance">
                    💰 <span id="bonusBalance">0</span> бонусов
                </div>
                <div>
                    Статус: <span id="loyaltyStatus">Постоянный</span>
                </div>
            </div>
            <div class="streak">
                🔥 Дней подряд: <span id="streakDays">0</span>
            </div>
        </header>

        <!-- Ежедневный бонус -->
        <section class="daily-checkin">
            <h2>📅 Ежедневный бонус</h2>
            <button id="checkinBtn">Забрать 5 бонусов</button>
            <div style="margin-top: 10px;">
                До 7 дней: <progress id="streakProgress" value="0" max="7"></progress>
            </div>
        </section>

        <!-- Квесты -->
        <section class="daily-quests">
            <h2>⚔️ Квесты на сегодня</h2>
            <div id="questsList"></div>
        </section>

        <!-- Колесо фортуны -->
        <section class="spin-wheel">
            <h2>🎡 Колесо фортуны</h2>
            <div class="wheel-container">
                <canvas id="wheelCanvas" width="280" height="280"></canvas>
            </div>
            <button id="spinBtn">🎡 Крутить (раз в неделю)</button>
            <div id="spinResult"></div>
        </section>

        <!-- Лидерборд -->
        <div class="leaderboard-left" id="leaderboardLeft">
            <div class="leaderboard-header">
                <h3>🏆 Топ игроков</h3>
            </div>
            <ol id="leaderboardList"></ol>
        </div>
    </div>

    <!-- Воронёнок -->
    <div class="mascot" id="mascot">
        <div class="mascot-bubble hidden" id="mascotBubble">
            Кар-р! Добро пожаловать!
        </div>
        <div class="raven-avatar" id="ravenAvatar">
            <img src="img/d-XmNVVcFSio2Xgyq27a6cmxGZWLqzpLm7-VvhEzDv_4R2QYPveiPaucOV9g2gyQiqp334Yg9aUwxljrP-6M1IvX.jpg" width="150" height="150" style="border-radius:50%; object-fit: cover;">
        </div>
    </div>

    <!-- Каталог призов -->
    <section class="prizes">
        <h2>🎁 Каталог призов</h2>
        <div class="prizes-container" id="prizesContainer">
            <!-- Призы будут добавляться через JavaScript -->
        </div>
    </section>

    <!-- Подключаем JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
